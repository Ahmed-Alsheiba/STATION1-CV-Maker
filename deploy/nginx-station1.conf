# STATION1 (CV-Maker) behind a Cloudflare Tunnel.
#
# cloudflared (running on this same host) receives the https edge traffic from
# Cloudflare and proxies it to this vhost over plain HTTP on localhost:8080.
# Cloudflare terminates TLS at the edge, so there is NO Certbot here and nothing
# listens on a public port. We hardcode X-Forwarded-Proto=https so Rails'
# force_ssl is satisfied and does not redirect-loop.

upstream station1 {
  server unix:///var/www/station1/current/tmp/sockets/puma.sock fail_timeout=0;
}

server {
  # localhost-only: only cloudflared (same machine) ever connects here.
  listen 127.0.0.1:8080;
  server_name station1.me www.station1.me;
  root /var/www/station1/current/public;

  client_max_body_size 20M;   # room for CV photo uploads

  # Long-cache fingerprinted assets, serve gzipped variants if present.
  location ~ ^/(assets|packs)/ {
    expires max;
    gzip_static on;
    add_header Cache-Control public;
  }

  # Serve static files from public/ directly; otherwise hand off to Puma.
  location / {
    try_files $uri @app;
  }

  location @app {
    proxy_pass http://station1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;   # Cloudflare edge is always https
    proxy_redirect off;
  }
}
