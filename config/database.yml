
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: station1_development

test:
  <<: *default
  database: station1_test

production:
  <<: *default
  # Kamal/Pi uses explicit DB_* vars (Ruby's URI parser mangles some passwords).
  # The native laptop deploy still sets DATABASE_URL — keep it working as a fallback.
  <% if ENV["DATABASE_URL"].present? %>
  url: <%= ENV["DATABASE_URL"] %>
  <% else %>
  host: <%= ENV["DB_HOST"] %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  database: <%= ENV["DB_NAME"] %>
  username: <%= ENV["DB_USER"] %>
  password: <%= Rails.application.credentials.dig(:db, :password) %>
  <% end %>
