
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: station1_development

test:
  <<: *default
  database: station1_test

production:
  <<: *default
  database: <%= ENV["DATABASE_URL"] %>
